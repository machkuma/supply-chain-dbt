# dbt Project Configuration

name: 'supply_chain_analytics'
version: '1.0.0'
config-version: 2

# Profile to use (points to profiles.yml)
profile: 'supply_chain'

# Directories
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model Configuration
models:
  supply_chain_analytics:
    # Bronze layer - Views (no transformation)
    bronze:
      +materialized: view
      +schema: raw_schema
      +database: bronze_db
    
    # Silver layer - Incremental tables with SCD
    silver:
      +materialized: incremental
      +schema: core_schema
      +database: silver_db
      +on_schema_change: "fail"
      
      dimensions:
        +materialized: table
        +tags: ["dimensions"]
      
      facts:
        +materialized: incremental
        +unique_key: "id"
        +tags: ["facts"]
    
    # Gold layer - Aggregated tables and views
    gold:
      +materialized: table
      +schema: analytics_schema
      +database: gold_db
      +tags: ["analytics"]
      
      metrics:
        +materialized: view
      
      aggregates:
        +materialized: table

# Snapshots (SCD Type 2)
snapshots:
  supply_chain_analytics:
    +target_schema: core_schema
    +target_database: silver_db
    +strategy: timestamp
    +updated_at: updated_at

# Seeds
seeds:
  supply_chain_analytics:
    +schema: raw_schema
    +database: bronze_db

# Variables
vars:
  start_date: '2022-01-01'
  end_date: '2024-12-31'

# Hooks
on-run-start:
  - "{{ log('Starting dbt run...', info=True) }}"

on-run-end:
  - "{{ log('dbt run completed!', info=True) }}"
