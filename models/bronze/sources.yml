# Source Configuration for Bronze Layer Tables
# Location: dbt_project/models/bronze/sources.yml

version: 2

sources:
  - name: bronze
    description: Raw data from source systems loaded via Snowflake external stages
    database: bronze_db
    schema: raw_schema
    
    tables:
      - name: raw_orders
        description: Raw orders data from transactional systems
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - not_null
              - unique
          
          - name: order_date
            description: Date when order was placed
            tests:
              - not_null
          
          - name: customer_id
            description: Customer identifier
            tests:
              - not_null
          
          - name: product_id
            description: Product identifier
            tests:
              - not_null
          
          - name: sales
            description: Total sales amount
            tests:
              - not_null
          
          - name: load_timestamp
            description: Timestamp when data was loaded
      
      - name: raw_shipments
        description: Raw shipment tracking data
        columns:
          - name: shipment_id
            description: Unique shipment identifier
            tests:
              - not_null
              - unique
          
          - name: order_id
            description: Related order identifier
            tests:
              - not_null
          
          - name: warehouse_id
            description: Warehouse from which shipment originated
          
          - name: carrier
            description: Shipping carrier name
          
          - name: shipment_status
            description: Current status of shipment
      
      - name: raw_inventory
        description: Raw inventory snapshot data
        columns:
          - name: snapshot_date
            description: Date of inventory snapshot
            tests:
              - not_null
          
          - name: warehouse_id
            description: Warehouse identifier
            tests:
              - not_null
          
          - name: product_id
            description: Product identifier
            tests:
              - not_null
          
          - name: stock_level
            description: Current stock level
      
      - name: raw_suppliers
        description: Raw supplier master data
        columns:
          - name: supplier_id
            description: Unique supplier identifier
            tests:
              - not_null
              - unique
          
          - name: supplier_name
            description: Supplier company name
          
          - name: supplier_country
            description: Supplier country
      
      - name: raw_products
        description: Raw product master data
        columns:
          - name: product_id
            description: Unique product identifier
            tests:
              - not_null
              - unique
          
          - name: product_name
            description: Product name
          
          - name: product_category
            description: Product category
          
          - name: supplier_id
            description: Supplier for this product

    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    
    loaded_at_field: load_timestamp
